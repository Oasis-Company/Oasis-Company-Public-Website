<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ceaserzhao</title>
  <meta name="description" content="ceaser, u should stop. nope, i should build the Oasisverse." />
  <style>
    :root {
      --ink: #000;
      --paper: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: "SFMono-Regular", "SF Mono", "JetBrains Mono", "Fira Code",
                   Menlo, Consolas, "Liberation Mono", monospace;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    /* The stage — pure white, everything centered */
    .stage {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.4rem;
      padding: 6vh 1.5rem 14vh;
    }

    /* Portrait — the single focal point */
    .portrait {
      width: clamp(190px, 46vw, 270px);
      aspect-ratio: 4 / 5;
      border-radius: 26px;
      overflow: hidden;
      opacity: 0;
      transform: scale(0.96);
      animation: rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
    }

    .portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(1.1) contrast(1.03) saturate(1.05);
      transform: scale(1.08);
      animation: drift 22s ease-in-out infinite alternate;
    }

    @keyframes rise {
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes drift {
      from { transform: scale(1.08) translateY(0); }
      to   { transform: scale(1.16) translateY(-2%); }
    }

    /* The dialogue — small, black, animated */
    .dialogue {
      font-size: 0.92rem;
      line-height: 1.85;
      letter-spacing: 0.01em;
      text-align: center;
      max-width: 30rem;
      min-height: 3.6em;
      opacity: 0;
      animation: fade 0.9s ease 0.7s forwards;
    }

    .dialogue .reply { font-weight: 600; }

    @keyframes fade { to { opacity: 1; } }

    .cursor {
      display: inline-block;
      width: 0.5em;
      height: 1.05em;
      margin-left: 1px;
      vertical-align: -0.18em;
      background: var(--ink);
      animation: blink 1.05s steps(1) infinite;
      transition: opacity 0.6s ease;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* Undecorated "my info" — fixed at the bottom, fades in only after the dialogue finishes */
    .info-link {
      position: fixed;
      left: 50%;
      bottom: 2.6rem;
      transform: translateX(-50%);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      color: var(--ink);
      text-decoration: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.1s ease, letter-spacing 0.4s ease;
    }

    .info-link::after {
      content: "";
      display: block;
      height: 1px;
      background: var(--ink);
      margin-top: 4px;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.4s ease;
    }

    .info-link:hover { letter-spacing: 0.28em; }
    .info-link:hover::after { transform: scaleX(1); }

    /* State after typing completes */
    body.done .cursor { opacity: 0; }
    body.done .info-link { opacity: 1; pointer-events: auto; }

    @media (prefers-reduced-motion: reduce) {
      .portrait, .dialogue { animation: none; opacity: 1; transform: none; }
      .portrait img { animation: none; transform: scale(1.05); }
      .cursor { display: none; }
      .info-link { opacity: 1; pointer-events: auto; transition: none; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="portrait">
      <img src="/image/people/ceaserzhao/cover.jpg" alt="ceaserzhao" decoding="async" />
    </div>

    <p class="dialogue">
      <span id="l1">ceaser, u should stop</span><br />
      <span id="l2" class="reply">nope, i should build the Oasisverse</span><span class="cursor" id="cursor"></span>
    </p>
  </main>

  <a class="info-link" href="/people/info">my info</a>

  <script>
    (function () {
      var l1 = document.getElementById('l1');
      var l2 = document.getElementById('l2');
      var cursor = document.getElementById('cursor');
      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function sleep(ms) {
        return new Promise(function (r) { setTimeout(r, ms); });
      }

      function type(el, str, speed) {
        return new Promise(function (resolve) {
          var i = 0;
          (function step() {
            if (i < str.length) {
              el.textContent += str.charAt(i++);
              setTimeout(step, speed + Math.random() * speed * 0.6);
            } else {
              resolve();
            }
          })();
        });
      }

      function reveal() {
        document.body.classList.add('done');
      }

      if (reduced) {
        // No animation: text already present in markup, just enable the button.
        reveal();
        return;
      }

      var t1 = l1.textContent;
      var t2 = l2.textContent;
      l1.textContent = '';
      l2.textContent = '';

      (async function run() {
        await type(l1, t1, 40);
        await sleep(1150);          // tension
        await type(l2, t2, 48);     // the reply — a touch more deliberate
        await sleep(650);
        reveal();
      })();
    })();
  </script>
</body>
</html>
